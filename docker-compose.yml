services:
  db:
    image: postgres:16-alpine
    container_name: sisinove_shared_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- jovemaprendiz ---
  jovemaprendiz_backend:
    build: ../sisinove-jovemaprendiz/backend
    restart: always
    env_file: ../sisinove-jovemaprendiz/.env
    volumes:
      - ../sisinove-jovemaprendiz/backend:/app
      - /app/node_modules
      - ../sisinove-jovemaprendiz/backend/uploads:/app/uploads:Z
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/sisinove_jovemaprendiz?schema=public
      PORT: 4003
    ports:
      - "127.0.0.1:4003:4003"

  jovemaprendiz_frontend:
    image: node:20-alpine
    restart: always
    working_dir: /app
    volumes:
      - ../sisinove-jovemaprendiz/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4003/api
    ports:
      - "127.0.0.1:8082:5173" # Mapeia a porta 8082 local para a 5173 do Vite
    # Adicionamos o comando para rodar o dev server do jovemaprendiz
    command: sh -c "npm install && npm run dev -- --host --port 5173"

volumes:
  postgres_data:
